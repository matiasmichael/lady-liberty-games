<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Torch Catcher 🔦 | Lady Liberty Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Georgia', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .back-link {
      position: fixed;
      top: 16px;
      left: 16px;
      color: #7ee787;
      text-decoration: none;
      font-size: 14px;
      opacity: 0.7;
    }
    .back-link:hover { opacity: 1; }
    h1 {
      font-size: clamp(22px, 4vw, 34px);
      color: #a8d5a2;
      margin-bottom: 4px;
      text-align: center;
    }
    .subtitle { color: #484f58; font-size: 13px; margin-bottom: 16px; font-style: italic; }
    #score-bar {
      display: flex;
      gap: 40px;
      margin-bottom: 16px;
      font-size: 18px;
    }
    .score-item span { color: #7ee787; font-size: 22px; font-weight: bold; }
    #canvas-wrap {
      position: relative;
      border: 2px solid #2ea043;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(46,160,67,0.15);
    }
    canvas { display: block; background: #0d2818; }
    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(13,17,23,0.88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 30px;
    }
    #overlay h2 { font-size: 28px; color: #a8d5a2; margin-bottom: 12px; }
    #overlay p { color: #8b949e; margin-bottom: 24px; font-size: 15px; line-height: 1.6; }
    #overlay .final { font-size: 32px; color: #7ee787; font-weight: bold; margin-bottom: 8px; }
    button {
      background: #2ea043;
      color: #fff;
      border: none;
      padding: 14px 36px;
      font-size: 18px;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s, transform 0.1s;
    }
    button:hover { background: #3fb950; transform: scale(1.05); }
    button:active { transform: scale(0.97); }
    .hint { margin-top: 14px; font-size: 12px; color: #484f58; }

    /* Leaderboard styles */
    .lb-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:999; }
    .lb-box { background:#fff; border-radius:20px; padding:28px; max-width:380px; width:90%; text-align:center; box-shadow:0 8px 32px rgba(0,0,0,0.3); }
    .lb-box h2 { color:#0d5c3a; font-size:22px; margin-bottom:8px; }
    .lb-box p { color:#555; font-size:14px; margin-bottom:16px; }
    .lb-name-input { width:100%; padding:10px 14px; font-size:16px; border:2px solid #a0dfc0; border-radius:10px; font-family:inherit; margin-bottom:14px; }
    .lb-name-input:focus { outline:none; border-color:#2ea043; }
    .lb-btn { padding:11px 28px; background:#2ea043; color:#fff; border:none; border-radius:12px; font-size:15px; font-family:inherit; cursor:pointer; font-weight:bold; }
    .lb-btn:hover { background:#1d8a30; }
    .lb-btn.secondary { background:#e8f5e9; color:#0d5c3a; margin-left:10px; }
    .lb-table { width:100%; border-collapse:collapse; margin:14px 0; font-size:14px; }
    .lb-table th { background:#e8f5e9; color:#0d5c3a; padding:6px 10px; font-size:12px; text-transform:uppercase; letter-spacing:1px; }
    .lb-table td { padding:7px 10px; border-bottom:1px solid #e0f7e9; }
    .lb-table tr:first-child td { font-weight:bold; color:#c05c00; }
    .lb-table tr:nth-child(2) td { color:#0d5c3a; }
    .lb-medal { font-size:16px; }
    .lb-you { background:#fffde7 !important; }
  </style>
</head>
<body>
  <a class="back-link" href="../index.html">← All Games</a>
  <h1>🔦 Torch Catcher</h1>
  <p class="subtitle">"Keep the flame of freedom alive!"</p>

  <div id="score-bar">
    <div class="score-item">Score: <span id="score">0</span></div>
    <div class="score-item">Lives: <span id="lives">❤️❤️❤️</span></div>
    <div class="score-item">Best: <span id="best">0</span></div>
  </div>

  <div id="canvas-wrap">
    <canvas id="c" width="480" height="520"></canvas>
    <div id="overlay">
      <h2>🗽 Torch Catcher</h2>
      <p>Lady Liberty keeps dropping her torch!<br>Move the catcher to save the flames.<br><br>← → Arrow keys &nbsp;|&nbsp; A/D keys &nbsp;|&nbsp; Touch/drag on mobile</p>
      <button onclick="startGame()">Light It Up!</button>
      <div class="hint">Pro tip: The torches speed up over time.</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const bestEl  = document.getElementById('best');

    let score, lives, best=0, torches, catcher, raf, speed, lastDrop, dropInterval, gameRunning;
    const CATCHER_W = 90, CATCHER_H = 18;
    const TORCH_SIZE = 28;
    const keys = {};
    let touchX = null;

    function startGame() {if(!playerName){lbShowNamePrompt(()=>_startGame());return;}_startGame();}
    function _startGame() {
      overlay.style.display = 'none';
      score = 0; lives = 3; speed = 3.5;
      torches = [];
      lastDrop = 0; dropInterval = 1400;
      catcher = { x: canvas.width/2 - CATCHER_W/2, y: canvas.height - 40 };
      gameRunning = true;
      scoreEl.textContent = 0;
      livesEl.textContent = '❤️'.repeat(lives);
      cancelAnimationFrame(raf);
      loop(0);
    }

    function loop(ts) {
      if (!gameRunning) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Move catcher
      const speed_c = 8;
      if (keys['ArrowLeft'] || keys['a'] || keys['A']) catcher.x -= speed_c;
      if (keys['ArrowRight'] || keys['d'] || keys['D']) catcher.x += speed_c;
      if (touchX !== null) {
        const rect = canvas.getBoundingClientRect();
        const tx = touchX - rect.left - CATCHER_W/2;
        catcher.x += (tx - catcher.x) * 0.18;
      }
      catcher.x = Math.max(0, Math.min(canvas.width - CATCHER_W, catcher.x));

      // Drop new torch
      if (ts - lastDrop > dropInterval) {
        torches.push({ x: Math.random() * (canvas.width - TORCH_SIZE), y: -TORCH_SIZE, caught: false });
        lastDrop = ts;
        dropInterval = Math.max(500, dropInterval - 18);
        speed = Math.min(11, speed + 0.15);
      }

      // Update torches
      torches.forEach(t => { if (!t.caught) t.y += speed; });

      // Catch / miss detection
      torches.forEach(t => {
        if (t.caught) return;
        if (t.y + TORCH_SIZE >= catcher.y &&
            t.x + TORCH_SIZE > catcher.x &&
            t.x < catcher.x + CATCHER_W) {
          t.caught = true;
          score++;
          scoreEl.textContent = score;
          if (score > best) { best = score; bestEl.textContent = best; }
          spawnParticles(t.x + TORCH_SIZE/2, catcher.y);
        } else if (t.y > canvas.height) {
          t.caught = true; // remove
          lives--;
          livesEl.textContent = '❤️'.repeat(Math.max(0,lives)) + (lives <= 0 ? '' : '');
          if (lives <= 0) { endGame(); return; }
        }
      });
      torches = torches.filter(t => t.y <= canvas.height + 10);

      // Draw torches
      torches.forEach(t => {
        if (t.caught) return;
        ctx.font = TORCH_SIZE + 'px serif';
        ctx.fillText('🔥', t.x, t.y + TORCH_SIZE);
      });

      // Draw catcher (Lady Liberty's hand)
      const grad = ctx.createLinearGradient(catcher.x, 0, catcher.x + CATCHER_W, 0);
      grad.addColorStop(0, '#2ea043');
      grad.addColorStop(0.5, '#7ee787');
      grad.addColorStop(1, '#2ea043');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect(catcher.x, catcher.y, CATCHER_W, CATCHER_H, 8);
      ctx.fill();
      ctx.font = '22px serif';
      ctx.fillText('🗽', catcher.x + CATCHER_W/2 - 11, catcher.y - 4);

      // Particles
      updateParticles();

      raf = requestAnimationFrame(loop);
    }

    // Simple particle system
    let particles = [];
    function spawnParticles(x, y) {
      for (let i = 0; i < 10; i++) {
        particles.push({
          x, y,
          vx: (Math.random()-0.5)*5,
          vy: -(Math.random()*4+1),
          alpha: 1,
          color: ['#ffa500','#ff6b00','#ffdd00','#7ee787'][Math.floor(Math.random()*4)],
          r: Math.random()*4+2
        });
      }
    }
    function updateParticles() {
      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.alpha -= 0.04;
        ctx.globalAlpha = Math.max(0, p.alpha);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha = 1;
      });
      particles = particles.filter(p => p.alpha > 0);
    }

    function endGame() {
      gameRunning = false;
      cancelAnimationFrame(raf);
      overlay.innerHTML = `<div style='max-height:80vh;overflow-y:auto;padding:10px'>
        <h2>Liberty Extinguished! 🕯️</h2>
        <div class="final">Score: ${score}</div>
        <p>${score >= 20 ? '🏆 Lady Liberty is proud!' : score >= 10 ? '🗽 Not bad, keep the flame alive!' : "You'll do better next time, Peretz."}</p>
        <button onclick="startGame()">Try Again</button>
        <br><br><a href="../index.html" style="color:#7ee787;font-size:13px;">← All Games</a>
      `;
      overlay.style.display = 'flex';
    }

    // Input
    document.addEventListener('keydown', e => { keys[e.key] = true; });
    document.addEventListener('keyup',   e => { keys[e.key] = false; });
    canvas.addEventListener('touchmove', e => { touchX = e.touches[0].clientX; e.preventDefault(); }, {passive:false});
    canvas.addEventListener('touchend',  () => { touchX = null; });
    canvas.addEventListener('mousemove', e => {
      if (gameRunning) {
        const rect = canvas.getBoundingClientRect();
        catcher.x = (e.clientX - rect.left) - CATCHER_W/2;
      }
    });

    // === LEADERBOARD SYSTEM ===
    let playerName = '';
    const LB_KEY = 'lb_' + (document.title.split('|')[0].split('—')[0].trim().replace(/[^a-z0-9]/gi,'_').toLowerCase());

    function lbGetScores() {
      try { return JSON.parse(localStorage.getItem(LB_KEY) || '[]'); } catch(e) { return []; }
    }
    function lbSaveScore(name, score) {
      let scores = lbGetScores();
      scores.push({ name, score, date: new Date().toLocaleDateString() });
      scores.sort((a,b) => b.score - a.score);
      scores = scores.slice(0, 10);
      localStorage.setItem(LB_KEY, JSON.stringify(scores));
      return scores;
    }
    function lbRenderTable(scores, highlightName) {
      const medals = ['🥇','🥈','🥉'];
      return '<table class="lb-table"><tr><th>#</th><th>Player</th><th>Score</th><th>Date</th></tr>' +
        scores.map((s,i) => `<tr class="${s.name===highlightName?'lb-you':''}"><td>${medals[i]||'#'+(i+1)}</td><td>${s.name}</td><td>${s.score}</td><td>${s.date}</td></tr>`).join('') +
        '</table>';
    }
    function lbShowNamePrompt(callback) {
      const existing = localStorage.getItem('lb_playername') || '';
      const scores = lbGetScores();
      const lbHtml = scores.length > 0 ? '<p style="font-size:12px;color:#888;margin-bottom:6px;">Current leaders:</p>' + lbRenderTable(scores.slice(0,5), '') : '';
      const d = document.createElement('div');
      d.className = 'lb-overlay';
      d.innerHTML = `<div class="lb-box">
        <h2>👑 Welcome!</h2>
        <p>Enter your name to track your score on the leaderboard!</p>
        ${lbHtml}
        <input class="lb-name-input" id="lbNameIn" placeholder="Your name..." maxlength="20" value="${existing}">
        <div><button class="lb-btn" onclick="lbConfirmName(this)">Let's Play!</button><button class="lb-btn secondary" onclick="lbSkipName(this)">Skip</button></div>
      </div>`;
      document.body.appendChild(d);
      document.getElementById('lbNameIn').focus();
      document.getElementById('lbNameIn').onkeydown = (e) => { if(e.key==='Enter') lbConfirmName(document.querySelector('.lb-btn')); };
      d._callback = callback;
    }
    function lbConfirmName(btn) {
      const val = document.getElementById('lbNameIn').value.trim() || 'Player';
      playerName = val;
      localStorage.setItem('lb_playername', val);
      const d = btn.closest('.lb-overlay');
      const cb = d._callback;
      d.remove();
      if(cb) cb();
    }
    function lbSkipName(btn) {
      playerName = localStorage.getItem('lb_playername') || 'Anonymous';
      const d = btn.closest('.lb-overlay');
      const cb = d._callback;
      d.remove();
      if(cb) cb();
    }
    function lbShowResults(score, extraHtml) {
      const scores = lbSaveScore(playerName || 'Anonymous', score);
      const rank = scores.findIndex(s => s.name === (playerName||'Anonymous') && s.score === score) + 1;
      return `<div style="margin-top:14px">
        <div style="font-size:13px;color:#0d5c3a;font-weight:bold;margin-bottom:6px;">🏆 Leaderboard</div>
        ${lbRenderTable(scores, playerName||'Anonymous')}
        ${rank===1?'<p style="color:#c05c00;font-weight:bold">🥇 New #1! You're on top!</p>':rank<=3?'<p style="color:#0d5c3a;font-weight:bold">Top 3! Great job!</p>':''}
      </div>`;
    }
    // END LEADERBOARD SYSTEM
  </script>
</body>
</html>
