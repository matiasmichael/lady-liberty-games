<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Harbor Runner ⛵</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:linear-gradient(160deg,#b8f0ff,#7dd8f8);font-family:'Georgia',serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}
    .back{position:fixed;top:12px;left:12px;color:#0d5c3a;text-decoration:none;font-size:14px;background:rgba(255,255,255,0.85);padding:5px 12px;border-radius:20px;border:1px solid #a0dfc0}
    h1{font-size:clamp(20px,4vw,32px);color:#0d4a6e;margin-bottom:4px;text-align:center}
    .sub{color:#555;font-size:13px;margin-bottom:12px;font-style:italic}
    #score-bar{display:flex;gap:28px;margin-bottom:12px;font-size:16px;color:#0d4a6e}
    #score-bar span{font-weight:bold;font-size:20px;color:#e8820c}
    #canvas-wrap{position:relative;border:3px solid #7dd8f8;border-radius:12px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.12)}
    canvas{display:block}
    #overlay{position:absolute;inset:0;background:rgba(184,240,255,0.93);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:28px}
    #overlay h2{font-size:26px;color:#0d4a6e;margin-bottom:10px}
    #overlay p{color:#333;margin-bottom:20px;font-size:14px;line-height:1.6}
    .final{font-size:30px;color:#e8820c;font-weight:bold;margin-bottom:8px}
    button{background:#0d4a6e;color:#fff;border:none;padding:12px 30px;font-size:17px;border-radius:20px;cursor:pointer;font-family:inherit;font-weight:bold}
    button:hover{background:#1565a0}

    /* Leaderboard styles */
    .lb-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:999; }
    .lb-box { background:#fff; border-radius:20px; padding:28px; max-width:380px; width:90%; text-align:center; box-shadow:0 8px 32px rgba(0,0,0,0.3); }
    .lb-box h2 { color:#0d5c3a; font-size:22px; margin-bottom:8px; }
    .lb-box p { color:#555; font-size:14px; margin-bottom:16px; }
    .lb-name-input { width:100%; padding:10px 14px; font-size:16px; border:2px solid #a0dfc0; border-radius:10px; font-family:inherit; margin-bottom:14px; }
    .lb-name-input:focus { outline:none; border-color:#2ea043; }
    .lb-btn { padding:11px 28px; background:#2ea043; color:#fff; border:none; border-radius:12px; font-size:15px; font-family:inherit; cursor:pointer; font-weight:bold; }
    .lb-btn:hover { background:#1d8a30; }
    .lb-btn.secondary { background:#e8f5e9; color:#0d5c3a; margin-left:10px; }
    .lb-table { width:100%; border-collapse:collapse; margin:14px 0; font-size:14px; }
    .lb-table th { background:#e8f5e9; color:#0d5c3a; padding:6px 10px; font-size:12px; text-transform:uppercase; letter-spacing:1px; }
    .lb-table td { padding:7px 10px; border-bottom:1px solid #e0f7e9; }
    .lb-table tr:first-child td { font-weight:bold; color:#c05c00; }
    .lb-table tr:nth-child(2) td { color:#0d5c3a; }
    .lb-medal { font-size:16px; }
    .lb-you { background:#fffde7 !important; }
  </style>
</head>
<body>
  <a class="back" href="../index.html">← All Games</a>
  <h1>⛵ Harbor Runner</h1>
  <p class="sub">Navigate through New York Harbor without crashing!</p>
  <div id="score-bar">Score: <span id="score">0</span>&nbsp;|&nbsp;Best: <span id="best">0</span></div>
  <div id="canvas-wrap">
    <canvas id="c" width="400" height="520"></canvas>
    <div id="overlay">
      <h2>⛵ Harbor Runner</h2>
      <p>Lady Liberty’s boat is sailing through the harbor!<br>Dodge the big tourist boats — and don’t hit the rocks!<br><br>←→ Arrow keys | Mouse | Touch<br>The longer you sail, the more boats appear!</p>
      <button onclick="startGame()">Set Sail!</button>
    </div>
  </div>
  <script>
    const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
    const overlay=document.getElementById('overlay');
    const scoreEl=document.getElementById('score'),bestEl=document.getElementById('best');
    let boat,obstacles,score,best=0,speed,spawnInt,lastSpawn,raf,running,startTime;
    const BW=50,BH=36;
    const keys={};
    let mouseX=null;

    function startGame(){if(!playerName){lbShowNamePrompt(()=>_startGame());return;}_startGame();}
    function _startGame(){
      overlay.style.display='none';
      boat={x:canvas.width/2-BW/2,y:canvas.height-80};
      obstacles=[];score=0;speed=2.8;spawnInt=1400;
      lastSpawn=0;running=true;startTime=performance.now();
      scoreEl.textContent=0;
      cancelAnimationFrame(raf);loop(0);
    }

    function drawWater(ts){
      const grad=ctx.createLinearGradient(0,0,0,canvas.height);
      grad.addColorStop(0,'#7dd8f8');grad.addColorStop(1,'#3ab5e5');
      ctx.fillStyle=grad;ctx.fillRect(0,0,canvas.width,canvas.height);
      // Wave lines
      ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=2;
      for(let i=0;i<8;i++){
        const y=((ts/1000*30+i*70)%canvas.height);
        ctx.beginPath();
        ctx.moveTo(0,y);
        for(let x=0;x<canvas.width;x+=20)
          ctx.lineTo(x,y+Math.sin(x/30+ts/800)*4);
        ctx.stroke();
      }
    }

    function loop(ts){
      if(!running)return;
      score=Math.floor((ts-startTime)/1000);
      if(score>best){best=score;bestEl.textContent=best;}
      scoreEl.textContent=score;

      drawWater(ts);

      // Move boat
      if(keys.ArrowLeft||keys.a||keys.A) boat.x-=7;
      if(keys.ArrowRight||keys.d||keys.D) boat.x+=7;
      if(mouseX!==null){const rect=canvas.getBoundingClientRect();boat.x+=(mouseX-rect.left-BW/2-boat.x)*0.15;}
      boat.x=Math.max(0,Math.min(canvas.width-BW,boat.x));

      // Spawn obstacles
      if(ts-lastSpawn>spawnInt){
        const types=['🚢','⛵','🧨'];// big ship, sailboat, rock
        const t=types[Math.floor(Math.random()*types.length)];
        obstacles.push({x:Math.random()*(canvas.width-50),y:-50,emoji:t,w:t==='🚢'?50:36,h:t==='🚢'?50:36});
        lastSpawn=ts;spawnInt=Math.max(500,spawnInt-18);speed=Math.min(10,speed+0.1);
      }

      // Update obstacles
      ctx.font='40px serif';
      obstacles.forEach(ob=>{
        ob.y+=speed;
        ctx.fillText(ob.emoji,ob.x,ob.y+ob.h);
        // Collision
        if(ob.y+ob.h>boat.y+6&&ob.y<boat.y+BH&&ob.x+ob.w>boat.x+6&&ob.x<boat.x+BW-6){
          running=false;cancelAnimationFrame(raf);endGame();return;
        }
      });
      obstacles=obstacles.filter(ob=>ob.y<canvas.height+60);

      // Draw Liberty's boat
      ctx.font='44px serif';ctx.textAlign='center';
      ctx.fillText('⛵',boat.x+BW/2,boat.y+BH);
      ctx.font='18px serif';
      ctx.fillText('🗽',boat.x+BW/2,boat.y+4);
      ctx.textAlign='left';

      raf=requestAnimationFrame(loop);
    }

    function endGame(){
      overlay.innerHTML=`<h2>${score>=30?'�ﱅ Harbor Champion!':'💨 Crash!'}</h2><div class="final">${score} seconds sailed!</div><p>${score>=30?'Amazing captain! Lady Liberty is so proud!':score>=15?'Great sailing! The harbor is tricky!':"Keep practicing — you'll be a captain soon!"}</p><button onclick="startGame()">Sail Again!</button><br><br><a href="../index.html" style="color:#0d4a6e;font-size:13px;">← All Games</a>` + lbShowResults(score, '');
      overlay.style.display='flex';
    }

    document.addEventListener('keydown',e=>keys[e.key]=true);
    document.addEventListener('keyup',e=>keys[e.key]=false);
    canvas.addEventListener('mousemove',e=>{if(running)mouseX=e.clientX;});
    canvas.addEventListener('touchmove',e=>{e.preventDefault();mouseX=e.touches[0].clientX;},{passive:false});
    canvas.addEventListener('touchend',()=>mouseX=null);

    // === LEADERBOARD SYSTEM ===
    let playerName = '';
    const LB_KEY = 'lb_' + (document.title.split('|')[0].split('—')[0].trim().replace(/[^a-z0-9]/gi,'_').toLowerCase());

    function lbGetScores() {
      try { return JSON.parse(localStorage.getItem(LB_KEY) || '[]'); } catch(e) { return []; }
    }
    function lbSaveScore(name, score) {
      let scores = lbGetScores();
      scores.push({ name, score, date: new Date().toLocaleDateString() });
      scores.sort((a,b) => b.score - a.score);
      scores = scores.slice(0, 10);
      localStorage.setItem(LB_KEY, JSON.stringify(scores));
      return scores;
    }
    function lbRenderTable(scores, highlightName) {
      const medals = ['🥇','🥈','🥉'];
      return '<table class="lb-table"><tr><th>#</th><th>Player</th><th>Score</th><th>Date</th></tr>' +
        scores.map((s,i) => `<tr class="${s.name===highlightName?'lb-you':''}"><td>${medals[i]||'#'+(i+1)}</td><td>${s.name}</td><td>${s.score}</td><td>${s.date}</td></tr>`).join('') +
        '</table>';
    }
    function lbShowNamePrompt(callback) {
      const existing = localStorage.getItem('lb_playername') || '';
      const scores = lbGetScores();
      const lbHtml = scores.length > 0 ? '<p style="font-size:12px;color:#888;margin-bottom:6px;">Current leaders:</p>' + lbRenderTable(scores.slice(0,5), '') : '';
      const d = document.createElement('div');
      d.className = 'lb-overlay';
      d.innerHTML = `<div class="lb-box">
        <h2>👑 Welcome!</h2>
        <p>Enter your name to track your score on the leaderboard!</p>
        ${lbHtml}
        <input class="lb-name-input" id="lbNameIn" placeholder="Your name..." maxlength="20" value="${existing}">
        <div><button class="lb-btn" onclick="lbConfirmName(this)">Let's Play!</button><button class="lb-btn secondary" onclick="lbSkipName(this)">Skip</button></div>
      </div>`;
      document.body.appendChild(d);
      document.getElementById('lbNameIn').focus();
      document.getElementById('lbNameIn').onkeydown = (e) => { if(e.key==='Enter') lbConfirmName(document.querySelector('.lb-btn')); };
      d._callback = callback;
    }
    function lbConfirmName(btn) {
      const val = document.getElementById('lbNameIn').value.trim() || 'Player';
      playerName = val;
      localStorage.setItem('lb_playername', val);
      const d = btn.closest('.lb-overlay');
      const cb = d._callback;
      d.remove();
      if(cb) cb();
    }
    function lbSkipName(btn) {
      playerName = localStorage.getItem('lb_playername') || 'Anonymous';
      const d = btn.closest('.lb-overlay');
      const cb = d._callback;
      d.remove();
      if(cb) cb();
    }
    function lbShowResults(score, extraHtml) {
      const scores = lbSaveScore(playerName || 'Anonymous', score);
      const rank = scores.findIndex(s => s.name === (playerName||'Anonymous') && s.score === score) + 1;
      return `<div style="margin-top:14px">
        <div style="font-size:13px;color:#0d5c3a;font-weight:bold;margin-bottom:6px;">🏆 Leaderboard</div>
        ${lbRenderTable(scores, playerName||'Anonymous')}
        ${rank===1?'<p style="color:#c05c00;font-weight:bold">🥇 New #1! You're on top!</p>':rank<=3?'<p style="color:#0d5c3a;font-weight:bold">Top 3! Great job!</p>':''}
      </div>`;
    }
    // END LEADERBOARD SYSTEM
  </script>
</body>
</html>
