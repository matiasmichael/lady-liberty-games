<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Seagull Dodge 🐦</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#87ceeb; font-family:'Georgia',serif; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; overflow:hidden; }
    .back { position:fixed; top:12px; left:12px; color:#1a5276; text-decoration:none; font-size:14px; background:rgba(255,255,255,0.8); padding:4px 10px; border-radius:20px; }
    h1 { font-size:clamp(20px,4vw,32px); color:#1a5276; margin-bottom:4px; text-align:center; }
    .sub { color:#555; font-size:13px; margin-bottom:12px; font-style:italic; }
    #score-bar { display:flex; gap:30px; margin-bottom:12px; font-size:16px; color:#1a5276; }
    #score-bar span { font-weight:bold; font-size:20px; }
    #canvas-wrap { position:relative; border:3px solid #1a5276; border-radius:12px; overflow:hidden; box-shadow:0 8px 32px rgba(0,0,0,0.2); }
    canvas { display:block; }
    #overlay { position:absolute; inset:0; background:rgba(135,206,235,0.93); display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:28px; }
    #overlay h2 { font-size:26px; color:#1a5276; margin-bottom:10px; }
    #overlay p { color:#333; margin-bottom:20px; font-size:14px; line-height:1.6; }
    .final { font-size:30px; color:#1a5276; font-weight:bold; margin-bottom:8px; }
    button { background:#1a5276; color:#fff; border:none; padding:12px 32px; font-size:17px; border-radius:8px; cursor:pointer; font-family:inherit; font-weight:bold; }
    button:hover { background:#2471a3; }
    .hint { margin-top:12px; font-size:11px; color:#666; }

    /* Leaderboard styles */
    .lb-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:999; }
    .lb-box { background:#fff; border-radius:20px; padding:28px; max-width:380px; width:90%; text-align:center; box-shadow:0 8px 32px rgba(0,0,0,0.3); }
    .lb-box h2 { color:#0d5c3a; font-size:22px; margin-bottom:8px; }
    .lb-box p { color:#555; font-size:14px; margin-bottom:16px; }
    .lb-name-input { width:100%; padding:10px 14px; font-size:16px; border:2px solid #a0dfc0; border-radius:10px; font-family:inherit; margin-bottom:14px; }
    .lb-name-input:focus { outline:none; border-color:#2ea043; }
    .lb-btn { padding:11px 28px; background:#2ea043; color:#fff; border:none; border-radius:12px; font-size:15px; font-family:inherit; cursor:pointer; font-weight:bold; }
    .lb-btn:hover { background:#1d8a30; }
    .lb-btn.secondary { background:#e8f5e9; color:#0d5c3a; margin-left:10px; }
    .lb-table { width:100%; border-collapse:collapse; margin:14px 0; font-size:14px; }
    .lb-table th { background:#e8f5e9; color:#0d5c3a; padding:6px 10px; font-size:12px; text-transform:uppercase; letter-spacing:1px; }
    .lb-table td { padding:7px 10px; border-bottom:1px solid #e0f7e9; }
    .lb-table tr:first-child td { font-weight:bold; color:#c05c00; }
    .lb-table tr:nth-child(2) td { color:#0d5c3a; }
    .lb-medal { font-size:16px; }
    .lb-you { background:#fffde7 !important; }
  </style>
</head>
<body>
  <a class="back" href="../index.html">← All Games</a>
  <h1>🐦 Seagull Dodge</h1>
  <p class="sub">Help Lady Liberty dodge the New York seagulls!</p>
  <div id="score-bar">Score: <span id="score">0</span> &nbsp;|&nbsp; Best: <span id="best">0</span></div>
  <div id="canvas-wrap">
    <canvas id="c" width="420" height="500"></canvas>
    <div id="overlay">
      <h2>🐦 Seagull Dodge</h2>
      <p>Seagulls are flying straight at Lady Liberty!<br>Move her left and right to dodge them all!<br><br>← → Arrow keys | Mouse | Touch</p>
      <button onclick="startGame()">Dodge!</button>
      <div class="hint">The longer you survive, the more seagulls attack!</div>
    </div>
  </div>

  <script>
    const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
    const overlay=document.getElementById('overlay');
    const scoreEl=document.getElementById('score'),bestEl=document.getElementById('best');
    let liberty,gulls,score,best=0,speed,spawnInt,lastSpawn,raf,running,startTime;
    const LW=50,LH=70;
    const keys={};
    let mouseX=null;

    function startGame(){if(!playerName){lbShowNamePrompt(()=>_startGame());return;}_startGame();}
    function _startGame(){
      overlay.style.display='none';
      liberty={x:canvas.width/2-LW/2,y:canvas.height-90};
      gulls=[];score=0;speed=3;spawnInt=1500;
      lastSpawn=0;running=true;startTime=performance.now();
      scoreEl.textContent=0;
      cancelAnimationFrame(raf);loop(0);
    }

    function drawLiberty(x,y){
      // Simple Lady Liberty emoji-style drawing
      ctx.font='48px serif'; ctx.textAlign='center';
      ctx.fillText('🗽',x+LW/2,y+LH);
      ctx.textAlign='left';
    }

    function loop(ts){
      if(!running)return;

      // Score = seconds survived
      score=Math.floor((ts-startTime)/1000);
      if(score>best){best=score;bestEl.textContent=best;}
      scoreEl.textContent=score;

      // Sky gradient
      const grad=ctx.createLinearGradient(0,0,0,canvas.height);
      grad.addColorStop(0,'#87ceeb'); grad.addColorStop(1,'#b0e0ff');
      ctx.fillStyle=grad; ctx.fillRect(0,0,canvas.width,canvas.height);

      // Clouds
      [[60,80],[200,50],[330,100],[130,150],[280,200]].forEach(([cx,cy])=>{
        ctx.fillStyle='rgba(255,255,255,0.7)';
        ctx.beginPath();ctx.ellipse(cx,cy,45,22,0,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.ellipse(cx+25,cy-8,30,18,0,0,Math.PI*2);ctx.fill();
      });

      // Harbor (bottom)
      ctx.fillStyle='#1a6ea8'; ctx.fillRect(0,canvas.height-30,canvas.width,30);

      // Move liberty
      if(keys.ArrowLeft||keys.a||keys.A) liberty.x-=7;
      if(keys.ArrowRight||keys.d||keys.D) liberty.x+=7;
      if(mouseX!==null){
        const rect=canvas.getBoundingClientRect();
        liberty.x+=(mouseX-rect.left-LW/2-liberty.x)*0.15;
      }
      liberty.x=Math.max(0,Math.min(canvas.width-LW,liberty.x));

      // Spawn gulls
      if(ts-lastSpawn>spawnInt){
        gulls.push({x:Math.random()*(canvas.width-30),y:-40,vx:(Math.random()-0.5)*2});
        lastSpawn=ts;
        spawnInt=Math.max(400,spawnInt-20);
        speed=Math.min(12,speed+0.1);
      }

      // Update gulls
      gulls.forEach(g=>{ g.y+=speed; g.x+=g.vx; });

      // Collision check
      for(let g of gulls){
        if(g.y+30>liberty.y+10 && g.y<liberty.y+LH && g.x+30>liberty.x+8 && g.x<liberty.x+LW-8){
          running=false; cancelAnimationFrame(raf); endGame(); return;
        }
      }

      gulls=gulls.filter(g=>g.y<canvas.height+50);

      // Draw gulls
      ctx.font='30px serif'; ctx.textAlign='left';
      gulls.forEach(g=>ctx.fillText('🐦',g.x,g.y+30));

      drawLiberty(liberty.x,liberty.y);

      raf=requestAnimationFrame(loop);
    }

    function endGame(){
      overlay.innerHTML=`<h2>🐦 Got You!</h2><div class="final">${score} seconds survived!</div><p>${score>=30?'🏆 Amazing dodger! Lady Liberty is safe!':score>=15?'Great reflexes! Almost got them all!':"The seagulls win this round..."}</p><button onclick="startGame()">Try Again!</button><br><br><a href="../index.html" style="color:#1a5276;font-size:13px;">← All Games</a>`;
      overlay.style.display='flex';
    }

    document.addEventListener('keydown',e=>keys[e.key]=true);
    document.addEventListener('keyup',e=>keys[e.key]=false);
    canvas.addEventListener('mousemove',e=>{if(running)mouseX=e.clientX;});
    canvas.addEventListener('touchmove',e=>{e.preventDefault();mouseX=e.touches[0].clientX;},{passive:false});
    canvas.addEventListener('touchend',()=>mouseX=null);

    // === LEADERBOARD SYSTEM ===
    let playerName = '';
    const LB_KEY = 'lb_' + (document.title.split('|')[0].split('—')[0].trim().replace(/[^a-z0-9]/gi,'_').toLowerCase());

    function lbGetScores() {
      try { return JSON.parse(localStorage.getItem(LB_KEY) || '[]'); } catch(e) { return []; }
    }
    function lbSaveScore(name, score) {
      let scores = lbGetScores();
      scores.push({ name, score, date: new Date().toLocaleDateString() });
      scores.sort((a,b) => b.score - a.score);
      scores = scores.slice(0, 10);
      localStorage.setItem(LB_KEY, JSON.stringify(scores));
      return scores;
    }
    function lbRenderTable(scores, highlightName) {
      const medals = ['🥇','🥈','🥉'];
      return '<table class="lb-table"><tr><th>#</th><th>Player</th><th>Score</th><th>Date</th></tr>' +
        scores.map((s,i) => `<tr class="${s.name===highlightName?'lb-you':''}"><td>${medals[i]||'#'+(i+1)}</td><td>${s.name}</td><td>${s.score}</td><td>${s.date}</td></tr>`).join('') +
        '</table>';
    }
    function lbShowNamePrompt(callback) {
      const existing = localStorage.getItem('lb_playername') || '';
      const scores = lbGetScores();
      const lbHtml = scores.length > 0 ? '<p style="font-size:12px;color:#888;margin-bottom:6px;">Current leaders:</p>' + lbRenderTable(scores.slice(0,5), '') : '';
      const d = document.createElement('div');
      d.className = 'lb-overlay';
      d.innerHTML = `<div class="lb-box">
        <h2>👑 Welcome!</h2>
        <p>Enter your name to track your score on the leaderboard!</p>
        ${lbHtml}
        <input class="lb-name-input" id="lbNameIn" placeholder="Your name..." maxlength="20" value="${existing}">
        <div><button class="lb-btn" onclick="lbConfirmName(this)">Let's Play!</button><button class="lb-btn secondary" onclick="lbSkipName(this)">Skip</button></div>
      </div>`;
      document.body.appendChild(d);
      document.getElementById('lbNameIn').focus();
      document.getElementById('lbNameIn').onkeydown = (e) => { if(e.key==='Enter') lbConfirmName(document.querySelector('.lb-btn')); };
      d._callback = callback;
    }
    function lbConfirmName(btn) {
      const val = document.getElementById('lbNameIn').value.trim() || 'Player';
      playerName = val;
      localStorage.setItem('lb_playername', val);
      const d = btn.closest('.lb-overlay');
      const cb = d._callback;
      d.remove();
      if(cb) cb();
    }
    function lbSkipName(btn) {
      playerName = localStorage.getItem('lb_playername') || 'Anonymous';
      const d = btn.closest('.lb-overlay');
      const cb = d._callback;
      d.remove();
      if(cb) cb();
    }
    function lbShowResults(score, extraHtml) {
      const scores = lbSaveScore(playerName || 'Anonymous', score);
      const rank = scores.findIndex(s => s.name === (playerName||'Anonymous') && s.score === score) + 1;
      return `<div style="margin-top:14px">
        <div style="font-size:13px;color:#0d5c3a;font-weight:bold;margin-bottom:6px;">🏆 Leaderboard</div>
        ${lbRenderTable(scores, playerName||'Anonymous')}
        ${rank===1?'<p style="color:#c05c00;font-weight:bold">🥇 New #1! You're on top!</p>':rank<=3?'<p style="color:#0d5c3a;font-weight:bold">Top 3! Great job!</p>':''}
      </div>`;
    }
    // END LEADERBOARD SYSTEM
  </script>
</body>
</html>
