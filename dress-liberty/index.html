<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Dress Lady Liberty! 👗</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:linear-gradient(160deg,#b8f0ff,#d4f5e9);font-family:'Georgia',serif;min-height:100vh;padding:16px;}
    .back{position:fixed;top:12px;left:12px;color:#0d5c3a;text-decoration:none;font-size:14px;background:rgba(255,255,255,0.85);padding:5px 12px;border-radius:20px;border:1px solid #a0dfc0;z-index:10}
    h1{font-size:clamp(20px,4vw,32px);color:#0d5c3a;text-align:center;margin:44px 0 4px}
    .sub{color:#555;font-size:13px;text-align:center;margin-bottom:16px;font-style:italic}
    .game-area{display:flex;flex-wrap:wrap;justify-content:center;gap:20px;max-width:900px;margin:0 auto}
    .liberty-display{background:rgba(255,255,255,0.9);border:2px solid #a0dfc0;border-radius:20px;padding:20px;min-width:240px;display:flex;flex-direction:column;align-items:center;box-shadow:0 4px 16px rgba(0,0,0,0.08)}
    .liberty-display h3{color:#0d5c3a;font-size:14px;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px}
    #liberty-preview{font-size:80px;line-height:1;text-align:center;margin:8px 0}
    #outfit-display{font-size:28px;margin-top:4px;text-align:center;min-height:36px}
    #color-bar{width:100%;height:16px;border-radius:8px;margin-top:10px;transition:background 0.3s}
    .panels{display:flex;flex-direction:column;gap:12px;max-width:500px}
    .panel{background:rgba(255,255,255,0.9);border:2px solid #a0dfc0;border-radius:16px;padding:14px;box-shadow:0 4px 14px rgba(0,0,0,0.07)}
    .panel h3{color:#0d5c3a;font-size:13px;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
    .options{display:flex;flex-wrap:wrap;gap:8px}
    .opt-btn{background:#e8f5e9;border:2px solid #a0dfc0;border-radius:12px;padding:8px 12px;cursor:pointer;font-size:20px;transition:transform 0.15s,border-color 0.15s,background 0.15s}
    .opt-btn:hover{transform:scale(1.15);border-color:#2ea043}
    .opt-btn.active{border-color:#2ea043;background:#c8e6c9;transform:scale(1.1)}
    .color-swatch{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform 0.15s,border-color 0.15s;box-shadow:0 2px 6px rgba(0,0,0,0.15)}
    .color-swatch.active{border-color:#0d5c3a;transform:scale(1.2)}
    .actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:14px}
    button.big{background:#2ea043;color:#fff;border:none;padding:10px 22px;font-size:15px;border-radius:20px;cursor:pointer;font-family:inherit;font-weight:bold}
    button.big:hover{background:#3fb950}
    button.big.orange{background:#e8820c}
    button.big.orange:hover{background:#f59d3d}
    #save-msg{text-align:center;color:#2ea043;font-size:13px;margin-top:8px;min-height:18px}
  </style>
</head>
<body>
  <a class="back" href="../index.html">← All Games</a>
  <h1>👗 Dress Lady Liberty!</h1>
  <p class="sub">Mix and match to make Lady Liberty totally fabulous!</p>

  <div class="game-area">
    <div class="liberty-display">
      <h3>Your Lady Liberty</h3>
      <div id="liberty-preview">🗽</div>
      <div id="outfit-display"></div>
      <div id="color-bar" style="background:#5b9e6e"></div>
    </div>

    <div class="panels">
      <div class="panel">
        <h3>👑 Crown Style</h3>
        <div class="options" id="crowns">
          <button class="opt-btn active" data-cat="crown" data-val="💫">✨ Sparkle</button>
          <button class="opt-btn" data-cat="crown" data-val="🌟">⭐ Star</button>
          <button class="opt-btn" data-cat="crown" data-val="🌸">🌸 Flower</button>
          <button class="opt-btn" data-cat="crown" data-val="🌈">🌈 Rainbow</button>
          <button class="opt-btn" data-cat="crown" data-val="🥂">🥂 Party</button>
          <button class="opt-btn" data-cat="crown" data-val="👑">👑 Gold</button>
        </div>
      </div>
      <div class="panel">
        <h3>👗 Outfit</h3>
        <div class="options" id="outfits">
          <button class="opt-btn active" data-cat="outfit" data-val="💫">✨ Classic Robe</button>
          <button class="opt-btn" data-cat="outfit" data-val="🌻">🌻 Sunny Dress</button>
          <button class="opt-btn" data-cat="outfit" data-val="🌟">⭐ Starry Gown</button>
          <button class="opt-btn" data-cat="outfit" data-val="🌈">🌈 Rainbow Robe</button>
          <button class="opt-btn" data-cat="outfit" data-val="💜">💜 Purple Princess</button>
          <button class="opt-btn" data-cat="outfit" data-val="♥️">♥️️ Superhero</button>
        </div>
      </div>
      <div class="panel">
        <h3>🎈 Accessory</h3>
        <div class="options" id="accessories">
          <button class="opt-btn active" data-cat="acc" data-val="">None</button>
          <button class="opt-btn" data-cat="acc" data-val="👗">👗 Scarf</button>
          <button class="opt-btn" data-cat="acc" data-val="💓">💓 Heart</button>
          <button class="opt-btn" data-cat="acc" data-val="🦄">🦄 Wings</button>
          <button class="opt-btn" data-cat="acc" data-val="🌼">🌼 Flowers</button>
          <button class="opt-btn" data-cat="acc" data-val="😎">😎 Sunglasses</button>
          <button class="opt-btn" data-cat="acc" data-val="🌈">🌈 Rainbow</button>
        </div>
      </div>
      <div class="panel">
        <h3>🎨 Robe Color</h3>
        <div class="options" id="colors"></div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="big" onclick="randomize()">🎲 Surprise Me!</button>
    <button class="big orange" onclick="saveIt()">📸 Save My Look!</button>
  </div>
  <div id="save-msg"></div>

  <script>
    const COLORS=[
      {c:'#5b9e6e',label:'Liberty Green'},
      {c:'#7dd8f8',label:'Sky Blue'},
      {c:'#ff9ff3',label:'Pretty Pink'},
      {c:'#ffd700',label:'Golden'},
      {c:'#ff6b6b',label:'Cherry Red'},
      {c:'#a29bfe',label:'Lavender'},
      {c:'#fdcb6e',label:'Peachy'},
      {c:'#ffffff',label:'Pure White'},
    ];
    const colorsDiv=document.getElementById('colors');
    let currentColor=COLORS[0].c;
    COLORS.forEach(cl=>{
      const s=document.createElement('div');
      s.className='color-swatch'+(cl.c===currentColor?' active':'');
      s.style.background=cl.c;
      s.title=cl.label;
      s.onclick=()=>{
        document.querySelectorAll('.color-swatch').forEach(x=>x.classList.remove('active'));
        s.classList.add('active');currentColor=cl.c;updatePreview();
      };
      colorsDiv.appendChild(s);
    });

    let choices={crown:'💫',outfit:'💫',acc:''};

    document.querySelectorAll('.opt-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const cat=btn.dataset.cat;
        document.querySelectorAll(`[data-cat="${cat}"]`).forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        choices[cat]=btn.dataset.val;
        updatePreview();
      });
    });

    function updatePreview(){
      document.getElementById('liberty-preview').textContent='🗽';
      document.getElementById('outfit-display').textContent=choices.crown+' '+choices.outfit+(choices.acc?' '+choices.acc:'');
      document.getElementById('color-bar').style.background=currentColor;
    }

    function randomize(){
      const allBtns={crown:[...document.querySelectorAll('[data-cat="crown"]')],outfit:[...document.querySelectorAll('[data-cat="outfit"]')],acc:[...document.querySelectorAll('[data-cat="acc"]')]};
      Object.keys(allBtns).forEach(cat=>{
        const btns=allBtns[cat];
        const pick=btns[Math.floor(Math.random()*btns.length)];
        document.querySelectorAll(`[data-cat="${cat}"]`).forEach(b=>b.classList.remove('active'));
        pick.classList.add('active');choices[cat]=pick.dataset.val;
      });
      const rndColor=COLORS[Math.floor(Math.random()*COLORS.length)];
      document.querySelectorAll('.color-swatch').forEach(x=>x.classList.remove('active'));
      document.querySelector(`.color-swatch[style*="${rndColor.c}"]`)?.classList.add('active');
      currentColor=rndColor.c;
      updatePreview();
    }

    function saveIt(){
      const msg=document.getElementById('save-msg');
      msg.textContent='💚 Saved! Lady Liberty loves her new look!';
      setTimeout(()=>msg.textContent='',3000);
    }

    updatePreview();
  </script>
</body>
</html>
