<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crown Jewels Memory ⭐ — Lady Liberty Games</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Georgia',serif;
      min-height:100vh;
      background:linear-gradient(160deg,#b8f0ff 0%,#d4f5e9 50%,#c2eedb 100%);
      display:flex; flex-direction:column; align-items:center;
      padding:20px 16px 60px;
    }
    .back { display:inline-block; margin-bottom:16px; color:#0d5c3a; text-decoration:none; font-size:14px; font-weight:bold; align-self:flex-start; }
    .back:hover { text-decoration:underline; }
    .crown-icon { font-size:56px; margin-bottom:6px; }
    h1 { font-size:clamp(20px,5vw,36px); color:#0d5c3a; text-shadow:2px 2px 0 rgba(255,255,255,0.8); margin-bottom:4px; text-align:center; }
    .sub { color:#1a7a4a; font-style:italic; font-size:14px; margin-bottom:6px; text-align:center; }
    .stats { display:flex; gap:24px; margin:12px 0; font-size:15px; color:#0d5c3a; font-weight:bold; }
    .stats span { background:rgba(255,255,255,0.85); padding:6px 16px; border-radius:20px; border:1px solid #a0dfc0; }
    .grid {
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      max-width:420px;
      width:100%;
      margin:10px auto;
    }
    .card {
      aspect-ratio:1;
      cursor:pointer;
      position:relative;
      transform-style:preserve-3d;
      transition:transform 0.4s ease;
      border-radius:14px;
    }
    .card.flipped { transform:rotateY(180deg); }
    .card.matched { animation:matchPop 0.35s ease; }
    @keyframes matchPop { 0%{transform:rotateY(180deg) scale(1)} 50%{transform:rotateY(180deg) scale(1.18)} 100%{transform:rotateY(180deg) scale(1)} }
    .card-face {
      position:absolute; inset:0;
      border-radius:14px;
      display:flex; align-items:center; justify-content:center;
      font-size:clamp(26px,6vw,38px);
      backface-visibility:hidden;
      -webkit-backface-visibility:hidden;
    }
    .card-back {
      background:linear-gradient(135deg,#0d5c3a,#1a7a4a);
      border:2px solid #a0dfc0;
      box-shadow:0 3px 10px rgba(0,0,0,0.12);
      color:rgba(255,255,255,0.4);
      font-size:20px;
    }
    .card-front {
      background:rgba(255,255,255,0.95);
      border:2px solid #a0dfc0;
      box-shadow:0 3px 10px rgba(0,0,0,0.12);
      transform:rotateY(180deg);
    }
    .card.matched .card-front {
      background:linear-gradient(135deg,#fffde7,#fff59d);
      border-color:#ffd700;
      box-shadow:0 0 18px rgba(255,215,0,0.5);
    }
    .msg { min-height:32px; font-size:15px; color:#0d5c3a; font-weight:bold; margin:10px 0; text-align:center; }
    .btn { padding:12px 32px; background:#2ea043; color:#fff; border:none; border-radius:14px; font-size:16px; font-family:'Georgia',serif; cursor:pointer; font-weight:bold; margin-top:10px; }
    .btn:hover { background:#1d8a30; }
    .crown-fill { display:flex; gap:4px; align-items:center; margin:8px 0; flex-wrap:wrap; justify-content:center; }
    .jewel { font-size:22px; opacity:0.25; transition:opacity 0.4s,transform 0.4s; }
    .jewel.lit { opacity:1; transform:scale(1.2); }
    .win-msg { text-align:center; background:rgba(255,255,255,0.95); border:2px solid #ffd700; border-radius:20px; padding:24px; max-width:380px; width:100%; margin-top:12px; box-shadow:0 8px 28px rgba(255,215,0,0.3); display:none; }
    .win-msg h2 { color:#0d5c3a; font-size:24px; margin-bottom:8px; }
    .win-msg p { color:#555; margin-bottom:16px; font-size:14px; }
    .trophy { font-size:54px; }

    /* Leaderboard styles */
    .lb-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:999; }
    .lb-box { background:#fff; border-radius:20px; padding:28px; max-width:380px; width:90%; text-align:center; box-shadow:0 8px 32px rgba(0,0,0,0.3); }
    .lb-box h2 { color:#0d5c3a; font-size:22px; margin-bottom:8px; }
    .lb-box p { color:#555; font-size:14px; margin-bottom:16px; }
    .lb-name-input { width:100%; padding:10px 14px; font-size:16px; border:2px solid #a0dfc0; border-radius:10px; font-family:inherit; margin-bottom:14px; }
    .lb-name-input:focus { outline:none; border-color:#2ea043; }
    .lb-btn { padding:11px 28px; background:#2ea043; color:#fff; border:none; border-radius:12px; font-size:15px; font-family:inherit; cursor:pointer; font-weight:bold; }
    .lb-btn:hover { background:#1d8a30; }
    .lb-btn.secondary { background:#e8f5e9; color:#0d5c3a; margin-left:10px; }
    .lb-table { width:100%; border-collapse:collapse; margin:14px 0; font-size:14px; }
    .lb-table th { background:#e8f5e9; color:#0d5c3a; padding:6px 10px; font-size:12px; text-transform:uppercase; letter-spacing:1px; }
    .lb-table td { padding:7px 10px; border-bottom:1px solid #e0f7e9; }
    .lb-table tr:first-child td { font-weight:bold; color:#c05c00; }
    .lb-table tr:nth-child(2) td { color:#0d5c3a; }
    .lb-medal { font-size:16px; }
    .lb-you { background:#fffde7 !important; }
  </style>
</head>
<body>
  <a class="back" href="../index.html">← Back to Games</a>
  <div class="crown-icon">👑</div>
  <h1>Crown Jewels Memory</h1>
  <p class="sub">Match all the jewel pairs to fill Lady Liberty's crown!</p>

  <div class="stats">
    <span>Moves: <span id="moves">0</span></span>
    <span>Pairs: <span id="pairs">0</span>/8</span>
    <span>Time: <span id="timer">0s</span></span>
  </div>

  <p style="font-size:13px;color:#1a7a4a;margin-bottom:6px;">Crown progress:</p>
  <div class="crown-fill" id="crownFill"></div>

  <div class="msg" id="msg">Flip two cards to find matching jewels! 👑</div>

  <div class="grid" id="grid"></div>

  <div class="win-msg" id="winMsg">
    <div class="trophy">🏆</div>
    <h2>Crown Complete! 👑✨</h2>
    <p id="winText"></p>
    <button class="btn" onclick="startGame()">Play Again!</button>
    <br><br>
    <a href="../index.html" style="color:#0d5c3a;font-size:13px;">← All Games</a>
  </div>

  <script>
    const JEWELS = ['💎','🔴','🟡','🟢','🔵','🟣','🌟','💜'];
    let cards=[], flipped=[], matched=0, moves=0, canFlip=true, timerInt, seconds=0, gameStarted=false;

    function buildCrown() {
      const cf = document.getElementById('crownFill');
      cf.innerHTML = JEWELS.map(j=>`<span class="jewel" data-jewel="${j}">${j}</span>`).join('');
    }

    function lightJewel(emoji) {
      const el = document.querySelector(`.jewel[data-jewel="${emoji}"]`);
      if(el) el.classList.add('lit');
    }

    function startGame() {if(!playerName){lbShowNamePrompt(()=>_startGame());return;}_startGame();}
    function _startGame() {
      document.getElementById('winMsg').style.display='none';
      document.getElementById('grid').style.display='grid';
      matched=0; moves=0; flipped=[]; canFlip=true; seconds=0; gameStarted=false;
      clearInterval(timerInt);
      document.getElementById('moves').textContent=0;
      document.getElementById('pairs').textContent=0;
      document.getElementById('timer').textContent='0s';
      document.getElementById('msg').textContent='Flip two cards to find matching jewels! 👑';
      buildCrown();
      const deck = [...JEWELS,...JEWELS].sort(()=>Math.random()-0.5);
      const grid=document.getElementById('grid');
      grid.innerHTML='';
      cards=[];
      deck.forEach((emoji,i)=>{
        const card=document.createElement('div');
        card.className='card';
        card.innerHTML=`<div class="card-face card-back">✦</div><div class="card-face card-front">${emoji}</div>`;
        card.dataset.emoji=emoji;
        card.dataset.idx=i;
        card.addEventListener('click',()=>flipCard(card));
        grid.appendChild(card);
        cards.push(card);
      });
    }

    function flipCard(card) {
      if(!canFlip || card.classList.contains('flipped') || card.classList.contains('matched')) return;
      if(!gameStarted) { gameStarted=true; timerInt=setInterval(()=>{ seconds++; document.getElementById('timer').textContent=seconds+'s'; },1000); }
      card.classList.add('flipped');
      flipped.push(card);
      if(flipped.length===2) {
        moves++;
        document.getElementById('moves').textContent=moves;
        canFlip=false;
        checkMatch();
      }
    }

    function checkMatch() {
      const [a,b]=flipped;
      if(a.dataset.emoji===b.dataset.emoji) {
        a.classList.add('matched'); b.classList.add('matched');
        lightJewel(a.dataset.emoji);
        matched++;
        document.getElementById('pairs').textContent=matched;
        document.getElementById('msg').textContent=matched<8?'✨ Match! Keep going!':'';
        flipped=[]; canFlip=true;
        if(matched===8) setTimeout(winGame,500);
      } else {
        document.getElementById('msg').textContent='Not quite — try again!';
        setTimeout(()=>{
          a.classList.remove('flipped'); b.classList.remove('flipped');
          flipped=[]; canFlip=true;
          document.getElementById('msg').textContent='Flip two cards to find matching jewels! 👑';
        },900);
      }
    }

    function winGame() {
      clearInterval(timerInt);
      const grid=document.getElementById('grid');
      grid.style.display='none';
      const rating = moves<=18?'🏆 Perfect!':moves<=24?'⭐ Great job!':'🌟 You did it!';
      document.getElementById('winText').textContent=`You matched all 8 jewels in ${moves} moves and ${seconds} seconds! ${rating} Lady Liberty's crown is sparkling!`;
      document.getElementById('winMsg').style.display='block'; document.getElementById('winMsg').insertAdjacentHTML('beforeend', lbShowResults(Math.max(0,200-moves*2+Math.max(0,300-seconds)), ''));
    }

    startGame();

    // === LEADERBOARD SYSTEM ===
    let playerName = '';
    const LB_KEY = 'lb_' + (document.title.split('|')[0].split('—')[0].trim().replace(/[^a-z0-9]/gi,'_').toLowerCase());

    function lbGetScores() {
      try { return JSON.parse(localStorage.getItem(LB_KEY) || '[]'); } catch(e) { return []; }
    }
    function lbSaveScore(name, score) {
      let scores = lbGetScores();
      scores.push({ name, score, date: new Date().toLocaleDateString() });
      scores.sort((a,b) => b.score - a.score);
      scores = scores.slice(0, 10);
      localStorage.setItem(LB_KEY, JSON.stringify(scores));
      return scores;
    }
    function lbRenderTable(scores, highlightName) {
      const medals = ['🥇','🥈','🥉'];
      return '<table class="lb-table"><tr><th>#</th><th>Player</th><th>Score</th><th>Date</th></tr>' +
        scores.map((s,i) => `<tr class="${s.name===highlightName?'lb-you':''}"><td>${medals[i]||'#'+(i+1)}</td><td>${s.name}</td><td>${s.score}</td><td>${s.date}</td></tr>`).join('') +
        '</table>';
    }
    function lbShowNamePrompt(callback) {
      const existing = localStorage.getItem('lb_playername') || '';
      const scores = lbGetScores();
      const lbHtml = scores.length > 0 ? '<p style="font-size:12px;color:#888;margin-bottom:6px;">Current leaders:</p>' + lbRenderTable(scores.slice(0,5), '') : '';
      const d = document.createElement('div');
      d.className = 'lb-overlay';
      d.innerHTML = `<div class="lb-box">
        <h2>👑 Welcome!</h2>
        <p>Enter your name to track your score on the leaderboard!</p>
        ${lbHtml}
        <input class="lb-name-input" id="lbNameIn" placeholder="Your name..." maxlength="20" value="${existing}">
        <div><button class="lb-btn" onclick="lbConfirmName(this)">Let's Play!</button><button class="lb-btn secondary" onclick="lbSkipName(this)">Skip</button></div>
      </div>`;
      document.body.appendChild(d);
      document.getElementById('lbNameIn').focus();
      document.getElementById('lbNameIn').onkeydown = (e) => { if(e.key==='Enter') lbConfirmName(document.querySelector('.lb-btn')); };
      d._callback = callback;
    }
    function lbConfirmName(btn) {
      const val = document.getElementById('lbNameIn').value.trim() || 'Player';
      playerName = val;
      localStorage.setItem('lb_playername', val);
      const d = btn.closest('.lb-overlay');
      const cb = d._callback;
      d.remove();
      if(cb) cb();
    }
    function lbSkipName(btn) {
      playerName = localStorage.getItem('lb_playername') || 'Anonymous';
      const d = btn.closest('.lb-overlay');
      const cb = d._callback;
      d.remove();
      if(cb) cb();
    }
    function lbShowResults(score, extraHtml) {
      const scores = lbSaveScore(playerName || 'Anonymous', score);
      const rank = scores.findIndex(s => s.name === (playerName||'Anonymous') && s.score === score) + 1;
      return `<div style="margin-top:14px">
        <div style="font-size:13px;color:#0d5c3a;font-weight:bold;margin-bottom:6px;">🏆 Leaderboard</div>
        ${lbRenderTable(scores, playerName||'Anonymous')}
        ${rank===1?'<p style="color:#c05c00;font-weight:bold">🥇 New #1! You're on top!</p>':rank<=3?'<p style="color:#0d5c3a;font-weight:bold">Top 3! Great job!</p>':''}
      </div>`;
    }
    // END LEADERBOARD SYSTEM
  </script>
</body>
</html>
