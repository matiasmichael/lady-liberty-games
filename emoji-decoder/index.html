<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Emoji Decoder 🤔 — Lady Liberty Games</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Georgia',serif; min-height:100vh; background:linear-gradient(160deg,#b8f0ff 0%,#d4f5e9 50%,#c2eedb 100%); display:flex; flex-direction:column; align-items:center; padding:30px 16px 80px; }
    h1 { font-size:clamp(22px,5vw,40px); color:#0d5c3a; text-shadow:2px 2px 0 rgba(255,255,255,0.8); margin-bottom:6px; text-align:center; }
    .sub { color:#1a7a4a; font-style:italic; font-size:15px; margin-bottom:28px; text-align:center; }
    .back { display:inline-block; margin-bottom:20px; color:#0d5c3a; text-decoration:none; font-size:14px; font-weight:bold; }
    .back:hover { text-decoration:underline; }
    .game-area { background:rgba(255,255,255,0.92); border:2px solid #a0dfc0; border-radius:24px; padding:28px; max-width:560px; width:100%; box-shadow:0 6px 24px rgba(0,0,0,0.1); }
    .emoji-display { font-size:clamp(40px,10vw,72px); text-align:center; margin:18px 0; letter-spacing:8px; }
    .hint { text-align:center; color:#888; font-size:13px; margin-bottom:18px; }
    .options { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:18px; }
    .opt { padding:13px; background:rgba(255,255,255,0.8); border:2px solid #a0dfc0; border-radius:14px; cursor:pointer; font-size:14px; font-family:'Georgia',serif; text-align:center; transition:all 0.2s; }
    .opt:hover { background:#d4f5e9; border-color:#2ea043; }
    .opt.correct { background:#d4f5e9; border-color:#2ea043; color:#0d5c3a; font-weight:bold; }
    .opt.wrong { background:#ffe0e0; border-color:#e53935; color:#b71c1c; }
    .feedback { text-align:center; font-size:18px; font-weight:bold; min-height:30px; margin-bottom:14px; }
    .score { text-align:center; color:#0d5c3a; font-size:16px; margin-bottom:16px; }
    .btn { display:block; width:100%; padding:14px; background:#2ea043; color:#fff; border:none; border-radius:14px; font-size:16px; font-family:'Georgia',serif; cursor:pointer; font-weight:bold; }
    .btn:hover { background:#1d8a30; }
    .progress { text-align:center; color:#888; font-size:13px; margin-top:10px; }

    /* Leaderboard styles */
    .lb-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:999; }
    .lb-box { background:#fff; border-radius:20px; padding:28px; max-width:380px; width:90%; text-align:center; box-shadow:0 8px 32px rgba(0,0,0,0.3); }
    .lb-box h2 { color:#0d5c3a; font-size:22px; margin-bottom:8px; }
    .lb-box p { color:#555; font-size:14px; margin-bottom:16px; }
    .lb-name-input { width:100%; padding:10px 14px; font-size:16px; border:2px solid #a0dfc0; border-radius:10px; font-family:inherit; margin-bottom:14px; }
    .lb-name-input:focus { outline:none; border-color:#2ea043; }
    .lb-btn { padding:11px 28px; background:#2ea043; color:#fff; border:none; border-radius:12px; font-size:15px; font-family:inherit; cursor:pointer; font-weight:bold; }
    .lb-btn:hover { background:#1d8a30; }
    .lb-btn.secondary { background:#e8f5e9; color:#0d5c3a; margin-left:10px; }
    .lb-table { width:100%; border-collapse:collapse; margin:14px 0; font-size:14px; }
    .lb-table th { background:#e8f5e9; color:#0d5c3a; padding:6px 10px; font-size:12px; text-transform:uppercase; letter-spacing:1px; }
    .lb-table td { padding:7px 10px; border-bottom:1px solid #e0f7e9; }
    .lb-table tr:first-child td { font-weight:bold; color:#c05c00; }
    .lb-table tr:nth-child(2) td { color:#0d5c3a; }
    .lb-medal { font-size:16px; }
    .lb-you { background:#fffde7 !important; }
  </style>
</head>
<body>
  <a class="back" href="../index.html">← Back to Games</a>
  <div style="font-size:64px;margin-bottom:10px;">🤔</div>
  <h1>Emoji Decoder</h1>
  <p class="sub">Guess the Lady Liberty theme from the emojis!</p>
  <div class="game-area">
    <div class="emoji-display" id="emojiDisplay">?</div>
    <div class="hint" id="hintText"></div>
    <div class="options" id="optionsGrid"></div>
    <div class="feedback" id="feedback"></div>
    <div class="score" id="scoreDisplay">Score: 0</div>
    <button class="btn" onclick="nextRound()" id="nextBtn" style="display:none">Next →</button>
    <div class="progress" id="progress"></div>
  </div>
  <script>
    const puzzles = [
      { emoji:"🗽🌊🚢", answer:"Statue of Liberty", options:["Statue of Liberty","Eiffel Tower","Big Ben","Colosseum"], hint:"NYC landmark..." },
      { emoji:"🍕🗽❤️", answer:"NYC Pizza Love", options:["NYC Pizza Love","Italian Trip","Cheese Dream","Lunch Break"], hint:"New York + food..." },
      { emoji:"🌅🏙️⭐", answer:"City Sunrise", options:["City Sunrise","Night Sky","Afternoon Nap","Beach Party"], hint:"Morning in the city..." },
      { emoji:"🦅🇺🇸🔦", answer:"American Eagle Torch", options:["American Eagle Torch","Flag Day","Camping Trip","Bird Watching"], hint:"Patriotic symbols..." },
      { emoji:"👑💚🗽", answer:"Lady Liberty's Crown", options:["Lady Liberty's Crown","Mermaid Queen","Green Fairy","Royal Tea"], hint:"The statue's famous accessory..." },
      { emoji:"🌆🌃🌉", answer:"New York City", options:["New York City","Tokyo Nights","Paris Evening","London Bridge"], hint:"The greatest city..." },
      { emoji:"🤝🌍❤️", answer:"Welcome Everyone", options:["Welcome Everyone","Travel Agency","World Cup","Pen Pals"], hint:"Liberty's message..." },
      { emoji:"🎆🎇🗽", answer:"4th of July", options:["4th of July","New Year's Eve","Birthday Party","Disco Night"], hint:"Fireworks + the statue..." },
      { emoji:"🐦🏙️😤", answer:"Seagull Dodge", options:["Seagull Dodge","Bird Watching","Zoo Trip","Nature Walk"], hint:"Our famous game..."},
      { emoji:"🧩🗽✅", answer:"Liberty Puzzle", options:["Liberty Puzzle","Jigsaw Party","Brain Teaser","Art Project"], hint:"Put her back together..."},
    ];
    let idx=0, score=0, answered=false;
    function loadPuzzle() {
      if(idx>=puzzles.length){ document.getElementById('emojiDisplay').textContent='🎉'; document.getElementById('hintText').textContent='You finished! Score: '+score+'/'+puzzles.length; document.getElementById('optionsGrid').innerHTML=''; document.getElementById('nextBtn').style.display='none'; const lb=document.createElement('div'); lb.innerHTML=lbShowResults(score,''); document.querySelector('.game-area').appendChild(lb); return; }
      const p=puzzles[idx];
      document.getElementById('emojiDisplay').textContent=p.emoji;
      document.getElementById('hintText').textContent='Hint: '+p.hint;
      document.getElementById('feedback').textContent='';
      document.getElementById('progress').textContent=(idx+1)+' / '+puzzles.length;
      document.getElementById('nextBtn').style.display='none';
      answered=false;
      const grid=document.getElementById('optionsGrid');
      const opts=[...p.options].sort(()=>Math.random()-0.5);
      grid.innerHTML=opts.map(o=>`<button class="opt" onclick="guess('${o.replace(/'/g,"\'")}','${p.answer.replace(/'/g,"\'")}',this)">${o}</button>`).join('');
    }
    function guess(chosen, correct, btn) {
      if(answered) return;
      answered=true;
      document.querySelectorAll('.opt').forEach(b=>{ if(b.textContent===correct) b.classList.add('correct'); });
      if(chosen===correct){ score++; document.getElementById('feedback').textContent='🎉 Correct!'; btn.classList.add('correct'); }
      else { document.getElementById('feedback').textContent='❌ It was: '+correct; btn.classList.add('wrong'); }
      document.getElementById('scoreDisplay').textContent='Score: '+score;
      document.getElementById('nextBtn').style.display='block';
    }
    function nextRound(){ idx++; loadPuzzle(); }
    lbShowNamePrompt(()=>{});
    loadPuzzle();

    // === LEADERBOARD SYSTEM ===
    let playerName = '';
    const LB_KEY = 'lb_' + (document.title.split('|')[0].split('—')[0].trim().replace(/[^a-z0-9]/gi,'_').toLowerCase());

    function lbGetScores() {
      try { return JSON.parse(localStorage.getItem(LB_KEY) || '[]'); } catch(e) { return []; }
    }
    function lbSaveScore(name, score) {
      let scores = lbGetScores();
      scores.push({ name, score, date: new Date().toLocaleDateString() });
      scores.sort((a,b) => b.score - a.score);
      scores = scores.slice(0, 10);
      localStorage.setItem(LB_KEY, JSON.stringify(scores));
      return scores;
    }
    function lbRenderTable(scores, highlightName) {
      const medals = ['🥇','🥈','🥉'];
      return '<table class="lb-table"><tr><th>#</th><th>Player</th><th>Score</th><th>Date</th></tr>' +
        scores.map((s,i) => `<tr class="${s.name===highlightName?'lb-you':''}"><td>${medals[i]||'#'+(i+1)}</td><td>${s.name}</td><td>${s.score}</td><td>${s.date}</td></tr>`).join('') +
        '</table>';
    }
    function lbShowNamePrompt(callback) {
      const existing = localStorage.getItem('lb_playername') || '';
      const scores = lbGetScores();
      const lbHtml = scores.length > 0 ? '<p style="font-size:12px;color:#888;margin-bottom:6px;">Current leaders:</p>' + lbRenderTable(scores.slice(0,5), '') : '';
      const d = document.createElement('div');
      d.className = 'lb-overlay';
      d.innerHTML = `<div class="lb-box">
        <h2>👑 Welcome!</h2>
        <p>Enter your name to track your score on the leaderboard!</p>
        ${lbHtml}
        <input class="lb-name-input" id="lbNameIn" placeholder="Your name..." maxlength="20" value="${existing}">
        <div><button class="lb-btn" onclick="lbConfirmName(this)">Let's Play!</button><button class="lb-btn secondary" onclick="lbSkipName(this)">Skip</button></div>
      </div>`;
      document.body.appendChild(d);
      document.getElementById('lbNameIn').focus();
      document.getElementById('lbNameIn').onkeydown = (e) => { if(e.key==='Enter') lbConfirmName(document.querySelector('.lb-btn')); };
      d._callback = callback;
    }
    function lbConfirmName(btn) {
      const val = document.getElementById('lbNameIn').value.trim() || 'Player';
      playerName = val;
      localStorage.setItem('lb_playername', val);
      const d = btn.closest('.lb-overlay');
      const cb = d._callback;
      d.remove();
      if(cb) cb();
    }
    function lbSkipName(btn) {
      playerName = localStorage.getItem('lb_playername') || 'Anonymous';
      const d = btn.closest('.lb-overlay');
      const cb = d._callback;
      d.remove();
      if(cb) cb();
    }
    function lbShowResults(score, extraHtml) {
      const scores = lbSaveScore(playerName || 'Anonymous', score);
      const rank = scores.findIndex(s => s.name === (playerName||'Anonymous') && s.score === score) + 1;
      return `<div style="margin-top:14px">
        <div style="font-size:13px;color:#0d5c3a;font-weight:bold;margin-bottom:6px;">🏆 Leaderboard</div>
        ${lbRenderTable(scores, playerName||'Anonymous')}
        ${rank===1?'<p style="color:#c05c00;font-weight:bold">🥇 New #1! You're on top!</p>':rank<=3?'<p style="color:#0d5c3a;font-weight:bold">Top 3! Great job!</p>':''}
      </div>`;
    }
    // END LEADERBOARD SYSTEM
  </script>
</body>
</html>
